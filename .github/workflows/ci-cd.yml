# CI/CD Pipeline — MindEase Web
#
# Triggers:
#   • Push to main/develop  → full pipeline + deploy (main only)
#   • Pull Request          → full pipeline (no deploy)
#   • Manual dispatch       → full pipeline + optional deploy

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20.x'
  VERCEL_PROJECT_DIR: 'dist/apps/host-shell'

# ──────────────────────────────────────────────────────────────────────────────
# LINT
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (all projects)
        run: npm run lint:all

# ──────────────────────────────────────────────────────────────────────────────
# UNIT TESTS
# ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/apps/host-shell/coverage-final.json
          flags: unittests
          name: mindease-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# BUILD
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mfe-dashboard (remote)
        run: npx nx build mfe-dashboard --configuration=production

      - name: Build mfe-tasks (remote)
        run: npx nx build mfe-tasks --configuration=production

      - name: Build mfe-profile (remote)
        run: npx nx build mfe-profile --configuration=production

      - name: Build host-shell (host)
        env:
          MFE_DASHBOARD_URL: /remotes/mfe-dashboard
          MFE_TASKS_URL: /remotes/mfe-tasks
          MFE_PROFILE_URL: /remotes/mfe-profile
        run: npx nx build host-shell --configuration=production

      - name: Package remotes into host-shell artifact
        run: |
          mkdir -p dist/apps/host-shell/remotes/mfe-dashboard
          mkdir -p dist/apps/host-shell/remotes/mfe-tasks
          mkdir -p dist/apps/host-shell/remotes/mfe-profile
          cp -R dist/apps/mfe-dashboard/. dist/apps/host-shell/remotes/mfe-dashboard/
          cp -R dist/apps/mfe-tasks/. dist/apps/host-shell/remotes/mfe-tasks/
          cp -R dist/apps/mfe-profile/. dist/apps/host-shell/remotes/mfe-profile/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# E2E TESTS
# ──────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Serve host-shell and run E2E tests
        run: npm run e2e:ci
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/host-shell-e2e/playwright-report/
          retention-days: 7

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: apps/host-shell-e2e/test-results/
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY — Vercel (main branch only)
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Verify host-shell build artifact
        run: |
          test -f "${{ env.VERCEL_PROJECT_DIR }}/index.html"
          ls -la "${{ env.VERCEL_PROJECT_DIR }}"

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          url=$(vercel deploy "${{ env.VERCEL_PROJECT_DIR }}" --prod --token=${{ secrets.VERCEL_TOKEN }} --yes | tail -n 1)
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Production deploy URL: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY PREVIEW — Pull Requests
# ──────────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Verify host-shell build artifact
        run: |
          test -f "${{ env.VERCEL_PROJECT_DIR }}/index.html"
          ls -la "${{ env.VERCEL_PROJECT_DIR }}"

      - name: Deploy preview to Vercel
        id: preview
        run: |
          url=$(vercel deploy "${{ env.VERCEL_PROJECT_DIR }}" --token=${{ secrets.VERCEL_TOKEN }} --yes | tail -n 1)
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Preview deploy URL: $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deploy:** ${{ steps.preview.outputs.url }}`
            })
