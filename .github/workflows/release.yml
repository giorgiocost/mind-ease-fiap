# Release Workflow
#
# Triggered on version tags (e.g. v1.0.0).
# Creates a GitHub Release with auto-generated changelog.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '20.x'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all MFEs (production)
        run: npm run build:all

      - name: Run unit tests
        run: npm run test:ci

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## Changes in ${{ github.ref_name }}

            > Auto-generated release from tag push.

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for full history.

      - name: Upload dist to release
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ github.ref_name }}
          path: dist/
          retention-days: 30
