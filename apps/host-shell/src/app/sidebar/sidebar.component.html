<!-- apps/host-shell/src/app/sidebar/sidebar.component.html -->
<nav
  class="sidebar"
  role="navigation"
  aria-label="Menu principal"
  [class.collapsed]="isCollapsed()"
  [attr.data-ui-density]="uiDensity()">

  <ul class="menu" role="list">
    @for (item of menuItems(); track item.id) {
      <li class="menu-item">
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.id === 'tasks' || item.id === 'preferences' }"
          class="menu-link"
          [class.focus-exit]="focusMode() && item.focusExit"
          [attr.aria-label]="isCollapsed() ? (focusMode() && item.focusExit ? 'Sair do Modo Foco — ' + item.label : item.label) : null"
          [attr.aria-current]="isActive(item.route) ? 'page' : null">

          <span class="menu-icon" aria-hidden="true">{{ item.icon }}</span>

          @if (!isCollapsed()) {
            <span class="menu-label">
              @if (focusMode() && item.focusExit) {
                <span class="focus-exit-hint">Sair do Foco</span>
              }
              {{ item.label }}
            </span>
          }

          @if (item.badge && item.badge > 0 && !isCollapsed()) {
            <span class="menu-badge" [attr.aria-label]="item.badge + ' notificações'">{{ item.badge }}</span>
          }
        </a>
      </li>
    }
  </ul>
</nav>
