<div [ngClass]="getLayoutClasses()" [attr.data-mobile]="isMobile()">
  <!-- Header Area -->
  <header class="layout__header">
    <ng-content select="[header]"></ng-content>
  </header>

  <!-- Sidebar Area -->
  @if (sidebarVisible()) {
    <aside class="layout__sidebar" [class.collapsed]="sidebarCollapsed()">
      <ng-content select="[sidebar]"></ng-content>
    </aside>
  }

  <!-- Mobile Overlay -->
  @if (isMobile() && mobileMenuOpen()) {
    <div class="layout__overlay" (click)="closeMobileMenu()"></div>
  }

  <!-- Main Content Area -->
  <main class="layout__main">
    <router-outlet></router-outlet>
  </main>
</div>
